name: Cross-Platform Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Windows build prerequisites
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run Windows test suite
        shell: powershell
        run: |
          python -m py_compile modular_file_utility_suite.py suite_updater.py
          python -m unittest discover -s tests -v
          python -m ruff check app_identity.py accessibility_support.py optional_dependencies.py settings_support.py job_ledger.py backend_support.py support_runtime.py addons submission-media/tools tests tools/performance_budget.py tools/ui_layout_probe.py
          python -m mypy app_identity.py accessibility_support.py optional_dependencies.py settings_support.py job_ledger.py backend_support.py support_runtime.py addons tools/performance_budget.py
          python -m mypy submission-media/tools --follow-imports=skip
          python -m pip_audit -r requirements.txt --progress-spinner off --format json --output build/pip-audit-windows.json
          python tools/ui_layout_probe.py --output-dir build/ui-layout-probe-windows
          python tools/performance_budget.py --report build/performance-budget-source-windows.json

      - name: Build Windows artifacts
        shell: cmd
        run: build_suite_release.bat

      - name: Enforce frozen Windows performance budgets
        shell: powershell
        run: |
          python tools/performance_budget.py `
            --app-binary dist/FormatFoundry.exe `
            --updater-binary dist/FormatFoundry_Updater.exe `
            --installer installer_output/FormatFoundry_Setup.exe `
            --report build/performance-budget-windows.json
          python tools/performance_budget.py `
            --app-binary dist/FormatFoundry_Portable/FormatFoundry.exe `
            --report build/performance-budget-portable-windows.json

      - name: Validate install surface
        shell: powershell
        run: |
          $version = python tools/extract_app_version.py
          if (-not $version) { throw 'Unable to determine APP_VERSION' }
          python tools/validate_install_surface.py --readme README.md --artifacts release_bins installer_output dist --required-asset "FormatFoundry_Setup_${version}.exe"

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: windows-build-artifacts
          if-no-files-found: error
          path: |
            dist/FormatFoundry.exe
            dist/FormatFoundry_Updater.exe
            installer_output/FormatFoundry_Setup.exe
            release_bins/FormatFoundry_*.exe
            release_bins/FormatFoundry_Updater_*.exe
            release_bins/FormatFoundry_Setup_*.exe
            release_bins/FormatFoundry_Portable_*_windows_x86_64.zip
            release_bins/SHA256SUMS-windows
            build/pip-audit-windows.json
            build/performance-budget-*.json
            build/ui-layout-probe-windows/**

  build-windows-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    environment: windows-release-signing
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Windows build prerequisites
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run Windows test suite
        shell: powershell
        run: |
          python -m py_compile modular_file_utility_suite.py suite_updater.py
          python -m unittest discover -s tests -v
          python -m ruff check app_identity.py accessibility_support.py optional_dependencies.py settings_support.py job_ledger.py backend_support.py support_runtime.py addons submission-media/tools tests tools/performance_budget.py tools/ui_layout_probe.py
          python -m mypy app_identity.py accessibility_support.py optional_dependencies.py settings_support.py job_ledger.py backend_support.py support_runtime.py addons tools/performance_budget.py
          python -m mypy submission-media/tools --follow-imports=skip
          python -m pip_audit -r requirements.txt --progress-spinner off --format json --output build/pip-audit-windows.json
          python tools/ui_layout_probe.py --output-dir build/ui-layout-probe-windows
          python tools/performance_budget.py --report build/performance-budget-source-windows.json

      - name: Resolve fail-closed signing provider
        id: signing
        shell: powershell
        env:
          REQUESTED_PROVIDER: ${{ vars.WINDOWS_SIGNING_PROVIDER }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $azureValues = @(
            $env:AZURE_CLIENT_ID,
            $env:AZURE_TENANT_ID,
            $env:AZURE_SUBSCRIPTION_ID,
            $env:AZURE_ARTIFACT_SIGNING_ENDPOINT,
            $env:AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME,
            $env:AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME
          )
          $pfxValues = @(
            $env:WINDOWS_SIGNING_CERTIFICATE_BASE64,
            $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD
          )
          $azureComplete = @($azureValues | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }).Count -eq $azureValues.Count
          $pfxComplete = @($pfxValues | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }).Count -eq $pfxValues.Count
          $provider = ([string]$env:REQUESTED_PROVIDER).Trim().ToLowerInvariant()
          if ([string]::IsNullOrWhiteSpace($provider)) {
            if ($azureComplete) {
              $provider = 'azure-artifact-signing'
            } elseif ($pfxComplete) {
              $provider = 'pfx'
            }
          }
          switch ($provider) {
            'azure-artifact-signing' {
              if (-not $azureComplete) {
                throw 'Azure Artifact Signing was selected, but its GitHub environment configuration is incomplete.'
              }
            }
            'pfx' {
              if (-not $pfxComplete) {
                throw 'PFX signing was selected, but its GitHub environment secrets are incomplete.'
              }
            }
            default {
              throw 'Tagged releases require Azure Artifact Signing or a complete PFX signing configuration. See docs/WINDOWS_SIGNING.md.'
            }
          }
          "provider=$provider" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using the configured $provider provider for this tagged release."

      - name: Azure login with GitHub OIDC
        if: steps.signing.outputs.provider == 'azure-artifact-signing'
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Windows binaries for managed signing
        if: steps.signing.outputs.provider == 'azure-artifact-signing'
        shell: powershell
        run: .\tools\build_windows_release_phase.ps1 -Phase Binaries

      - name: Sign app and updater with Azure Artifact Signing
        if: steps.signing.outputs.provider == 'azure-artifact-signing'
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: |
            ${{ github.workspace }}\dist\FormatFoundry.exe
            ${{ github.workspace }}\dist\FormatFoundry_Updater.exe
            ${{ github.workspace }}\dist\FormatFoundry_Portable\FormatFoundry.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Format Foundry
          description-url: https://pugmaster04.github.io/Format-Foundry/index.html
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Build installer from signed binaries
        if: steps.signing.outputs.provider == 'azure-artifact-signing'
        shell: powershell
        run: .\tools\build_windows_release_phase.ps1 -Phase Installer

      - name: Sign installer with Azure Artifact Signing
        if: steps.signing.outputs.provider == 'azure-artifact-signing'
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: ${{ github.workspace }}\installer_output\FormatFoundry_Setup.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Format Foundry Installer
          description-url: https://pugmaster04.github.io/Format-Foundry/downloads.html
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Stage Azure-signed release assets
        if: steps.signing.outputs.provider == 'azure-artifact-signing'
        shell: powershell
        run: .\tools\build_windows_release_phase.ps1 -Phase Stage

      - name: Build and sign with protected PFX fallback
        if: steps.signing.outputs.provider == 'pfx'
        shell: cmd
        env:
          REQUIRE_WINDOWS_SIGNING: "1"
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ vars.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: build_suite_release.bat

      - name: Validate install surface
        shell: powershell
        run: |
          $version = python tools/extract_app_version.py
          if (-not $version) { throw 'Unable to determine APP_VERSION' }
          python tools/validate_install_surface.py --readme README.md --artifacts release_bins installer_output dist --required-asset "FormatFoundry_Setup_${version}.exe"

      - name: Verify tagged Windows release signatures
        shell: powershell
        run: |
          $version = python tools/extract_app_version.py
          $names = "FormatFoundry_${version}.exe|FormatFoundry_Updater_${version}.exe|FormatFoundry_Setup_${version}.exe"
          $portable = Join-Path $PWD "dist\FormatFoundry_Portable\FormatFoundry.exe"
          .\tools\verify_windows_signatures.ps1 -Directory release_bins -ExpectedNames $names -AdditionalPaths $portable -ReceiptPath release_bins\WINDOWS_SIGNATURES_VERIFIED.json

      - name: Enforce signed Windows performance budgets
        shell: powershell
        run: |
          python tools/performance_budget.py `
            --app-binary dist/FormatFoundry.exe `
            --updater-binary dist/FormatFoundry_Updater.exe `
            --installer installer_output/FormatFoundry_Setup.exe `
            --report build/performance-budget-windows.json
          python tools/performance_budget.py `
            --app-binary dist/FormatFoundry_Portable/FormatFoundry.exe `
            --report build/performance-budget-portable-windows.json

      - name: Upload signed Windows release artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: windows-build-artifacts
          if-no-files-found: error
          path: |
            dist/FormatFoundry.exe
            dist/FormatFoundry_Updater.exe
            installer_output/FormatFoundry_Setup.exe
            release_bins/FormatFoundry_*.exe
            release_bins/FormatFoundry_Updater_*.exe
            release_bins/FormatFoundry_Setup_*.exe
            release_bins/FormatFoundry_Portable_*_windows_x86_64.zip
            release_bins/SHA256SUMS-windows
            release_bins/WINDOWS_SIGNATURES_VERIFIED.json
            build/pip-audit-windows.json
            build/performance-budget-*.json
            build/ui-layout-probe-windows/**

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Linux build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv python3-tk tk-dev dpkg-dev curl appstream xvfb xauth ffmpeg pandoc libreoffice p7zip-full imagemagick aria2

      - name: Build Linux artifacts
        shell: bash
        run: |
          chmod +x build_linux.sh
          ./build_linux.sh

      - name: Run Linux test suite
        shell: bash
        run: |
          .venv/bin/python -m pip install -r requirements-dev.txt
          .venv/bin/python -m py_compile modular_file_utility_suite.py suite_updater.py
          .venv/bin/python -m unittest discover -s tests -v
          .venv/bin/python -m ruff check app_identity.py accessibility_support.py optional_dependencies.py settings_support.py job_ledger.py backend_support.py support_runtime.py addons submission-media/tools tests tools/performance_budget.py tools/ui_layout_probe.py
          .venv/bin/python -m mypy app_identity.py accessibility_support.py optional_dependencies.py settings_support.py job_ledger.py backend_support.py support_runtime.py addons tools/performance_budget.py
          .venv/bin/python -m mypy submission-media/tools --follow-imports=skip
          .venv/bin/python -m pip_audit -r requirements.txt --progress-spinner off --format json --output build/pip-audit-linux.json
          .venv/bin/python -m cyclonedx_py requirements requirements.txt --output-reproducible --of JSON -o build/FormatFoundry-SBOM.cdx.json
          FORMAT_FOUNDRY_REAL_BACKENDS=1 .venv/bin/python -m unittest tests.integration.test_real_backends -v
          xvfb-run -a --server-args="-screen 0 1920x1080x24" .venv/bin/python tools/ui_layout_probe.py --output-dir build/ui-layout-probe-linux
          .venv/bin/python tools/performance_budget.py --report build/performance-budget-source-linux.json
          node --check docs/site.js
          node tests/site_contract.test.js

      - name: Smoke test Linux binaries
        shell: bash
        run: |
          chmod +x release_bins/FormatFoundry release_bins/FormatFoundry_Updater
          ./release_bins/FormatFoundry --version
          ./release_bins/FormatFoundry --smoke-test
          ./release_bins/FormatFoundry_Updater --version
          ./release_bins/FormatFoundry_Updater --smoke-test
          .venv/bin/python tools/performance_budget.py \
            --app-binary release_bins/FormatFoundry \
            --updater-binary release_bins/FormatFoundry_Updater \
            --report build/performance-budget-linux.json
          APPIMAGE_PACKAGE="$(find release_bins -maxdepth 1 -type f -name 'FormatFoundry_linux_*.AppImage' | head -n 1)"
          chmod +x "$APPIMAGE_PACKAGE"
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE_PACKAGE" --version
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE_PACKAGE" --smoke-test

      - name: Validate Debian package layout
        shell: bash
        run: |
          DEB_PACKAGE="$(find release_bins -maxdepth 1 -type f -name 'format-foundry_*.deb' | head -n 1)"
          dpkg-deb --info "$DEB_PACKAGE"
          rm -rf deb-smoke
          mkdir -p deb-smoke
          dpkg-deb -x "$DEB_PACKAGE" deb-smoke
          test -x deb-smoke/usr/bin/format-foundry
          test -x deb-smoke/usr/bin/format-foundry-updater
          test -x deb-smoke/opt/format-foundry/FormatFoundry
          test -x deb-smoke/opt/format-foundry/FormatFoundry_Updater
          test -f deb-smoke/usr/share/applications/io.github.pugmaster04.formatfoundry.desktop
          test -f deb-smoke/usr/share/metainfo/io.github.pugmaster04.formatfoundry.appdata.xml
          test -f deb-smoke/usr/share/pixmaps/format-foundry.png
          test -f "$DEB_PACKAGE"
          APPIMAGE_PACKAGE="$(find release_bins -maxdepth 1 -type f -name 'FormatFoundry_linux_*.AppImage' | head -n 1)"
          test -f "$APPIMAGE_PACKAGE"

      - name: Validate install surface
        shell: bash
        run: |
          VERSION="$(python3 tools/extract_app_version.py)"
          test -n "$VERSION"
          python3 tools/validate_install_surface.py \
            --readme README.md \
            --artifacts release_bins \
            --required-asset "format-foundry_${VERSION}_amd64.deb" \
            --required-asset "FormatFoundry_linux_${VERSION}_x86_64.AppImage"

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: linux-build-artifacts
          if-no-files-found: error
          path: |
            release_bins/FormatFoundry
            release_bins/FormatFoundry_Updater
            release_bins/FormatFoundry_linux_*.tar.gz
            release_bins/*.deb
            release_bins/*.AppImage
            release_bins/SHA256SUMS-linux
            release_bins/SHA256SUMS
            build/FormatFoundry-SBOM.cdx.json
            build/pip-audit-linux.json
            build/performance-budget-*.json
            build/ui-layout-probe-linux/**

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows-release
      - build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download Windows artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-build-artifacts
          path: release-payload/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: linux-build-artifacts
          path: release-payload/linux

      - name: Prepare release notes
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/prepare_release_metadata.py \
            --tag "$GITHUB_REF_NAME" \
            --changelog CHANGELOG.md \
            --notes RELEASE_NOTES.md \
            --github-output "$GITHUB_OUTPUT"

      - name: Assemble coordinated release
        id: assemble
        env:
          RELEASE_TITLE: ${{ steps.prep.outputs.title }}
          RELEASE_VERSION: ${{ steps.prep.outputs.package_version }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$RELEASE_VERSION"
          declare -a ASSETS=(
            "release-payload/windows/release_bins/FormatFoundry_${VERSION}.exe"
            "release-payload/windows/release_bins/FormatFoundry_Updater_${VERSION}.exe"
            "release-payload/windows/release_bins/FormatFoundry_Setup_${VERSION}.exe"
            "release-payload/windows/release_bins/FormatFoundry_Portable_${VERSION}_windows_x86_64.zip"
            "release-payload/windows/release_bins/WINDOWS_SIGNATURES_VERIFIED.json"
          )
          cp release-payload/linux/build/FormatFoundry-SBOM.cdx.json "FormatFoundry_${VERSION}_SBOM.cdx.json"
          cp release-payload/linux/build/pip-audit-linux.json "FormatFoundry_${VERSION}_pip-audit-linux.json"
          cp release-payload/linux/build/performance-budget-linux.json "FormatFoundry_${VERSION}_performance-linux.json"
          cp release-payload/windows/build/pip-audit-windows.json "FormatFoundry_${VERSION}_pip-audit-windows.json"
          cp release-payload/windows/build/performance-budget-windows.json "FormatFoundry_${VERSION}_performance-windows.json"
          cp release-payload/windows/build/performance-budget-portable-windows.json "FormatFoundry_${VERSION}_performance-portable-windows.json"
          ASSETS+=(
            "FormatFoundry_${VERSION}_SBOM.cdx.json"
            "FormatFoundry_${VERSION}_pip-audit-linux.json"
            "FormatFoundry_${VERSION}_pip-audit-windows.json"
            "FormatFoundry_${VERSION}_performance-linux.json"
            "FormatFoundry_${VERSION}_performance-windows.json"
            "FormatFoundry_${VERSION}_performance-portable-windows.json"
          )
          while IFS= read -r asset; do
            ASSETS+=("$asset")
          done < <(find release-payload/linux -maxdepth 2 -type f \( -name "format-foundry_${VERSION}_*.deb" -o -name "FormatFoundry_linux_${VERSION}_*.AppImage" -o -name "FormatFoundry_linux_${VERSION}_*.tar.gz" \) | sort)
          test "${#ASSETS[@]}" -gt 0
          for asset in "${ASSETS[@]}"; do
            test -f "$asset"
          done
          declare -a PROVENANCE_ARGS=()
          for asset in "${ASSETS[@]}"; do
            PROVENANCE_ARGS+=(--artifact "$asset")
          done
          python3 tools/generate_provenance_manifest.py \
            --version "$VERSION" \
            --source-commit "$GITHUB_SHA" \
            --output PROVENANCE.json \
            "${PROVENANCE_ARGS[@]}"
          ASSETS+=("PROVENANCE.json")
          : > SHA256SUMS
          for asset in "${ASSETS[@]}"; do
            printf '%s  %s\n' "$(sha256sum "$asset" | cut -d' ' -f1)" "$(basename "$asset")" >> SHA256SUMS
          done
          ASSETS+=("SHA256SUMS")
          ASSET_LIST="$RUNNER_TEMP/format-foundry-release-assets.txt"
          printf '%s\n' "${ASSETS[@]}" > "$ASSET_LIST"
          printf 'asset_list=%s\n' "$ASSET_LIST" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub release provenance attestation
        id: release_attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            release-payload/windows/release_bins/FormatFoundry_*.exe
            release-payload/windows/release_bins/FormatFoundry_Portable_*.zip
            release-payload/windows/release_bins/WINDOWS_SIGNATURES_VERIFIED.json
            release-payload/linux/release_bins/format-foundry_*.deb
            release-payload/linux/release_bins/FormatFoundry_linux_*.AppImage
            release-payload/linux/release_bins/FormatFoundry_linux_*.tar.gz
            FormatFoundry_*_SBOM.cdx.json
            FormatFoundry_*_pip-audit-*.json
            FormatFoundry_*_performance-*.json
            PROVENANCE.json
            SHA256SUMS

      - name: Stage provenance attestation bundle
        env:
          ATTESTATION_BUNDLE: ${{ steps.release_attestation.outputs.bundle-path }}
          RELEASE_ASSET_LIST: ${{ steps.assemble.outputs.asset_list }}
          RELEASE_VERSION: ${{ steps.assemble.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          test -f "$ATTESTATION_BUNDLE"
          BUNDLE_NAME="FormatFoundry_${RELEASE_VERSION}_github-attestation.json"
          cp "$ATTESTATION_BUNDLE" "$BUNDLE_NAME"
          printf '%s\n' "$BUNDLE_NAME" >> "$RELEASE_ASSET_LIST"

      - name: Publish coordinated release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ASSET_LIST: ${{ steps.assemble.outputs.asset_list }}
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.prep.outputs.tag }}"
          TITLE="${{ steps.prep.outputs.title }}"
          mapfile -t ASSETS < "$RELEASE_ASSET_LIST"
          test "${#ASSETS[@]}" -gt 0
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${ASSETS[@]}" --clobber
            gh release edit "$TAG_NAME" --title "$TITLE" --notes-file RELEASE_NOTES.md --latest
          else
            gh release create "$TAG_NAME" "${ASSETS[@]}" --title "$TITLE" --notes-file RELEASE_NOTES.md --latest
          fi
