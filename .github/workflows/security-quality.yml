name: Security and Quality

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  schedule:
    - cron: "31 7 * * 1"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install application and quality dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Compile and test
        run: |
          python -m py_compile modular_file_utility_suite.py suite_updater.py
          python -m unittest discover -s tests -v

      - name: Lint and type-check dependency-light seams
        run: |
          python -m ruff check app_identity.py accessibility_support.py optional_dependencies.py settings_support.py job_ledger.py backend_support.py support_runtime.py addons submission-media/tools tests tools/performance_budget.py tools/ui_layout_probe.py
          python -m mypy app_identity.py accessibility_support.py optional_dependencies.py settings_support.py job_ledger.py backend_support.py support_runtime.py addons tools/performance_budget.py
          python -m mypy submission-media/tools --follow-imports=skip

      - name: Enforce source performance budgets
        run: python tools/performance_budget.py --report build/performance-budget-security-quality.json

      - name: Audit Python dependencies
        id: audit
        continue-on-error: true
        run: python -m pip_audit -r requirements.txt --progress-spinner off --format json --output build/pip-audit.json

      - name: Generate reproducible CycloneDX SBOM
        run: python -m cyclonedx_py requirements requirements.txt --output-reproducible --of JSON -o build/FormatFoundry-SBOM.cdx.json

      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: security-quality-evidence
          if-no-files-found: error
          path: |
            build/pip-audit.json
            build/FormatFoundry-SBOM.cdx.json
            build/performance-budget-security-quality.json

      - name: Fail when the vulnerability audit found an issue
        if: steps.audit.outcome == 'failure'
        run: |
          echo "pip-audit reported a known vulnerability. Review the uploaded JSON evidence."
          exit 1

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: python
      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
